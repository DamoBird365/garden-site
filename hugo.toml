baseURL = 'https://garden.damobird365.com/'
languageCode = 'en-gb'
title = "Damo's Garden"
theme = 'PaperMod'
paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[params]
  env = "production"
  title = "Damo's Garden"
  description = "A garden journal from Northeast Scotland — planting, growing, and harvesting in Aberdeen"
  author = "Damien B"
  keywords = ["garden", "gardening", "scotland", "aberdeen", "vegetables", "allotment", "planting calendar"]
  DateFormat = "2 January 2006"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hideSummary = false
  showtoc = true

  [params.homeInfoParams]
    Title = "🌱 Welcome to Damo's Garden"
    Content = "Follow my gardening journey in Aberdeen, Northeast Scotland. From seed to harvest — tips, updates, and a planting calendar for the Scottish climate."

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.assets]
    favicon = "/images/favicon.ico"
    favicon16x16 = "/images/favicon-16x16.png"
    favicon32x32 = "/images/favicon-32x32.png"
    apple_touch_icon = "/images/apple-touch-icon.png"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.label]
    text = "🌱 Damo's Garden"

  [params.weather]
    latitude = 57.1497
    longitude = -2.0943
    location = "Aberdeen"

[taxonomies]
  category = "categories"
  tag = "tags"
  vegetable = "vegetables"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[[menus.main]]
  name = "Blog"
  url = "/blog/"
  weight = 10

[[menus.main]]
  name = "Calendar"
  url = "/calendar/"
  weight = 20

[[menus.main]]
  name = "Gallery"
  url = "/gallery/"
  weight = 30

[[menus.main]]
  name = "Wishlist"
  url = "/wishlist/"
  weight = 40

[[menus.main]]
  name = "About"
  url = "/about/"
  weight = 50

[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false
  minifyOutput = true
